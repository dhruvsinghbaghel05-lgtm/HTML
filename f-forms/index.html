<!DOCTYPE html>
<html lang="en">

<body>
    <!-- Introduction to form tag -->
 <form>
  Form elements go here
 </form>
<!-- Form Attributes -->
 <action="submit.php" method="post" autocomplete="off"></action>
 <BR></BR>
<!-- Input Elements -->
 <form action="">
    <label for="name">Name :</label>
    <input type="text" id="name" name="name">
    <br>

    <label for="email">Email :</label>
    <input type="email" id="email" name="email" required>
    <br>

    <label for="message">Message :</label>
    <textarea name="message" id="message" rows="4" required></textarea>
    <br>

    <label for="password">Password :</label>
    <input type="password" name="password" id="password" required>
    <br>

    <label for="age">Age :</label>
    <input type="age" id="age" name="age" min="1">
    <br>

    <label for="dob">Date of Birth :</label>
    <input type="date" id="dob" name="dob" required>
    <br>

    <label for="time">Time</label>
    <input type="time" id="dob" name="dob">
    <br>

    <label for="file">File :</label>
    <input type="file" name="file" id="file">
    <br>

    <label for="url">URL :</label>
    <input type="url" name="url" id="url">
    <br>

    <button type="submit">Submit</button>


 </form>
 <br><br>
    <!-- text area selected DROPDOWN -->
   <label for="comments">Comments :</label>
   <textarea name="comments" id="comments" rows="4" cols="50"></textarea>
   <BR></BR>

    <!-- Dropdowns Tags -->
     <label for="country">Country :</label>
        <select name="country" id="country">
            <option value="usa">USA</option>
            <option value="india">India</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
            </select>
            <button type="submit">Submit</button>

            <BR></BR>
    <!-- Radio Buttond & Chechboxes -->

    <label for="radio">Gender :</label><br>
    <input type="radio" name="gender" value="male">Male <br>
    <input type="radio" name="gender" value="female">Female <br>

    <label for="checkbox">Skills :</label>
    <input type="checkbox" value="HTML"> HTML
    <input type="checkbox" value="CSS"> CSS
    <BR></BR>

     <!-- Buttons & Submit Controls -->
     <button type="submit">Submit</button>
     <input type="reset">
