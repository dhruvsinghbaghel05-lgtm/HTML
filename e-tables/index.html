<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <!-- table tag -->
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>John</td>
            <td>25</td>
        </tr>
    </table>
    <HR></HR>

    <!-- thead, tbody, tfoot tags -->
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John</td>
                <td>25</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>1</td>
            </tr>
        </tfoot>
    </table>
    <hr>
    <table>
        <thead>
        <tr>
            <th>Product</th>
            <th>Price</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Phone</td>
            <td>$500</td>
        </tr>
        <tr>
            <td>Laptop</td>
            <td>$1000</td>
        </tr>
        <tr>
            <td>Tablet</td>
            <td>$300</td>
        </tr>
        </tbody>
        <tfoot id="foot">
        <tr>
            <td>Total</td>
            <td>$1800</td>
        </tfoot>
    </table>
    <HR></HR>
    <!-- Captions & Borders -->
     <table border="2">
        <caption style="font-weight: 700;">Student Records</caption>
        <tr>
            <td>John Doe</td>
            <td>25</td>
            <td>35</td>
        </tr>
        <tr>
            <td>Jane Smith</td>
            <td>30</td>
            <td>45</td>
        </tr>
    </table>
    <HR></HR>

</body>
</html>
