<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tags</title>
</head>
<body>
    <!-- Heading tags  -->
        <h1>This is heading 1</h1>
        <h2>This is heading 2</h2>
        <h3>This is heading 3</h3>
        <h4>This is heading 4</h4>
        <h5>This is heading 5</h5>
        <h6>This is heading 6</h6>
        <br>

         <!-- Paragraph tag -->
        <p>This is a paragraph tag. It is used to define a block of text as a paragraph.</p>
        <br>

          <!-- Line break tag -->
        <p>This is the first line.<br> This is the second line.</p>
        <br>

        <!-- Horizontal rule tag -->
        <hr>

        <!-- Anchor tag: It is used to link other webpages to the currnet page -->
            <a href="https://www.google.com" target="_main">This is a link to Google</a>
            <br>

        <!-- Image tag: It is used to display images on the webpage -->
             <img src="image.jpeg" alt="Description of image " width="400">  
             <br>
             
             <figcaption>This is the caption for the image</figcaption>

        

</body>
</html>
