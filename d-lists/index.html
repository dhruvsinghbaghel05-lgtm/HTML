<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <!-- UNORDERED LIST -->
    <h1>Unordered List</h1>
    <ul>
        <li>Mango</li>
        <li>Apple</li>
        <li>Orange</li>
    </ul>
    <!-- ORDERED LIST -->
    <h1>Ordered List</h1>
    <ol>
        <li>Iphone</li>
        <li>Samsung</li>
        <li>Xiomi</li>
    </ol>
    <!-- Definition Description List -->
    <h1>Definition Description List</h1>
    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>
        <dt>CSS</dt>    
        <dd>Cascading Style Sheet</dd>
        <dt>JS</dt>
        <dd>JavaScript</dd>
    </dl>
</body>
</html>
