<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <!-- UNORDERED LIST -->
    <h1>Unordered List</h1>
    <ul>
        <li>Mango</li>
        <li>Apple</li>
        <li>Orange</li>
    </ul>
    <!-- ORDERED LIST -->
    <h1>Ordered List</h1>
    <ol>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
    </ol>
</body>
</html>
